<!-- frontend/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PaySaaS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">PaySaaS</div>
  </nav>

  <div class="auth-container">
    <div class="auth-header">
      <h2 id="auth-title">Log In to Your Account</h2>
      <p id="auth-subtitle">Welcome back! Please enter your details.</p>
    </div>

    <form id="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;" id="submit-btn">Log In</button>
    </form>

    <div class="auth-footer">
      <p id="auth-switch-text">Don't have an account? <a href="#" id="auth-switch-link">Register</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
