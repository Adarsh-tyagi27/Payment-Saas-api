version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payment_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_saas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: payment_saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
